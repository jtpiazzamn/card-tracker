<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <title>Change Password — CardLedger</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center px-4 py-12">

    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="text-2xl font-bold text-gray-900">
                Card<span class="text-indigo-600">Ledger</span>
            </div>
            <p class="text-sm text-gray-400 mt-1">Your Collection. Your Stats.</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 px-8 py-10">

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="mb-5 bg-indigo-50 border border-indigo-200 text-indigo-800 rounded-lg px-4 py-3 text-sm">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <!-- Change Password Section -->
                <div>
                    <h2 class="text-lg font-bold text-gray-900 mb-4">Change Password</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Current Password</label>
                            <input type="password" name="current_password" placeholder="••••••••" required
                                   class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">New Password</label>
                            <input type="password" name="new_password" placeholder="••••••••" required
                                   class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Confirm New Password</label>
                            <input type="password" name="confirm_password" placeholder="••••••••" required
                                   class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white">
                        </div>
                    </div>
                </div>

                <div class="border-t border-gray-100 pt-4">
                    <h2 class="text-lg font-bold text-gray-900 mb-1">Security Question</h2>
                    <p class="text-xs text-gray-400 mb-4">Set a security question so you can reset your password if you forget it.</p>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Security Question</label>
                            <select name="security_question" title="Security Question"
                                    class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white">
                                <option value="">-- Keep existing question --</option>
                                <option value="What was the name of your first pet?" {% if current_user.security_question == 'What was the name of your first pet?' %}selected{% endif %}>What was the name of your first pet?</option>
                                <option value="What city were you born in?" {% if current_user.security_question == 'What city were you born in?' %}selected{% endif %}>What city were you born in?</option>
                                <option value="What is your mother's maiden name?" {% if current_user.security_question == "What is your mother's maiden name?" %}selected{% endif %}>What is your mother's maiden name?</option>
                                <option value="What was the name of your elementary school?" {% if current_user.security_question == 'What was the name of your elementary school?' %}selected{% endif %}>What was the name of your elementary school?</option>
                                <option value="What was the make of your first car?" {% if current_user.security_question == 'What was the make of your first car?' %}selected{% endif %}>What was the make of your first car?</option>
                                <option value="What is the name of your favorite sports team?" {% if current_user.security_question == 'What is the name of your favorite sports team?' %}selected{% endif %}>What is the name of your favorite sports team?</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Security Answer</label>
                            <input type="text" name="security_answer" placeholder="Leave blank to keep existing answer"
                                   class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white">
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-between pt-2">
                    <a href="{{ url_for('main.dashboard') }}"
                       class="text-sm text-gray-500 hover:text-gray-700 font-medium">Cancel</a>
                    <button type="submit"
                            class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-6 py-2.5 rounded-lg transition-colors">
                        Save Changes
                    </button>
                </div>

            </form>
        </div>

    </div>

</body>
</html>
