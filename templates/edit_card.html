<!DOCTYPE html>
<html>
<head>
    <title>Card Tracker - Edit Card</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <h1>Card Tracker</h1>
        <span>Welcome, {{ current_user.username }}</span>
        <a href="{{ url_for('auth.logout') }}">Logout</a>
    </nav>
    <div class="form-container">
        <h2>Edit Card</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Player Name *</label>
                <input type="text" name="player_name" value="{{ card.player_name }}" required>
            </div>
            <div class="form-group">
                <label>Sport</label>
                <select name="sport">
                    <option value="">Select Sport</option>
                    <option value="Baseball" {% if card.sport == 'Baseball' %}selected{% endif %}>Baseball</option>
                    <option value="Basketball" {% if card.sport == 'Basketball' %}selected{% endif %}>Basketball</option>
                    <option value="Football" {% if card.sport == 'Football' %}selected{% endif %}>Football</option>
                    <option value="Hockey" {% if card.sport == 'Hockey' %}selected{% endif %}>Hockey</option>
                    <option value="Soccer" {% if card.sport == 'Soccer' %}selected{% endif %}>Soccer</option>
                    <option value="Other" {% if card.sport == 'Other' %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Year</label>
                <input type="text" name="year" value="{{ card.year }}">
            </div>
            <div class="form-group">
                <label>Manufacturer</label>
                <input type="text" name="manufacturer" value="{{ card.manufacturer }}">
            </div>
            <div class="form-group">
                <label>Condition</label>
                <select name="condition">
                    <option value="">Select Condition</option>
                    <option value="Poor" {% if card.condition == 'Poor' %}selected{% endif %}>Poor</option>
                    <option value="Fair" {% if card.condition == 'Fair' %}selected{% endif %}>Fair</option>
                    <option value="Good" {% if card.condition == 'Good' %}selected{% endif %}>Good</option>
                    <option value="Very Good" {% if card.condition == 'Very Good' %}selected{% endif %}>Very Good</option>
                    <option value="Excellent" {% if card.condition == 'Excellent' %}selected{% endif %}>Excellent</option>
                    <option value="Near Mint" {% if card.condition == 'Near Mint' %}selected{% endif %}>Near Mint</option>
                    <option value="Mint" {% if card.condition == 'Mint' %}selected{% endif %}>Mint</option>
                    <option value="Gem Mint" {% if card.condition == 'Gem Mint' %}selected{% endif %}>Gem Mint</option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Buy Price *</label>
                    <input type="number" name="buy_price" step="0.01" value="{{ card.buy_price }}" required>
                </div>
                <div class="form-group">
                    <label>Sell Price (if sold)</label>
                    <input type="number" name="sell_price" step="0.01" value="{{ card.sell_price or '' }}">
                </div>
            </div>
            <div class="form-group">
                <label>Card Photo (leave blank to keep current)</label>
                {% if card.photo_filename %}
                    <img src="{{ url_for('static', filename='uploads/' + card.photo_filename) }}" style="width:100px; border-radius:5px; margin-bottom:8px; display:block;">
                {% endif %}
                <input type="file" name="photo" accept="image/*">
            </div>
            <div class="form-buttons">
                <a href="{{ url_for('main.card_detail', card_id=card.id) }}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn">Save Changes</button>
            </div>
        </form>
    </div>
</body>
</html>
