<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardLedger - Create User</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <h1>Card<span>Tracker</span></h1>
        <div class="nav-right">
            <span>Welcome, {{ current_user.username }}</span>
            <a href="{{ url_for('admin.admin_dashboard') }}" style="background:#0f3460;">Admin</a>
            <a href="{{ url_for('main.lots') }}" style="background:#0f3460;">Lots</a>
            <a href="{{ url_for('auth.logout') }}">Logout</a>
        </div>
    </nav>
    <div class="page-wrapper">
        <div class="dashboard-container">
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert" style="margin-bottom:20px;">{{ messages[0] }}</div>
                {% endif %}
            {% endwith %}
            <div class="section-header">
                <div class="section-title">Create New User</div>
                <a href="{{ url_for('admin.admin_dashboard') }}" class="btn" style="background:#666;">Back to Admin</a>
            </div>
            <div style="background:white; padding:40px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); margin-top:20px; max-width:620px;">
                <form method="POST" autocomplete="off">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="username" required placeholder="e.g. johndoe" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" required placeholder="e.g. john@email.com" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" required placeholder="Set a password for this user" autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label>Security Question</label>
                        <select name="security_question">
                            <option value="">-- Select a Security Question --</option>
                            <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                            <option value="What city were you born in?">What city were you born in?</option>
                            <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                            <option value="What was the name of your elementary school?">What was the name of your elementary school?</option>
                            <option value="What was the make of your first car?">What was the make of your first car?</option>
                            <option value="What is the name of your favorite sports team?">What is the name of your favorite sports team?</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Security Answer</label>
                        <input type="text" name="security_answer" placeholder="Answer (not case sensitive)" autocomplete="off">
                    </div>
                    <div class="form-group" style="display:flex; align-items:center; gap:10px;">
                        <input type="checkbox" name="is_admin" id="is_admin" style="width:18px; height:18px;">
                        <label for="is_admin" style="margin:0;">Make this user an Admin</label>
                    </div>
                    <div style="margin-top:25px; display:flex; gap:10px;">
                        <a href="{{ url_for('admin.admin_dashboard') }}" class="btn" style="background:#666;">Cancel</a>
                        <button type="submit" class="btn">Create User</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
