<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CardLedger - Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <h1>Card<span>Tracker</span></h1>
        <div class="nav-right">
            <span>Welcome, {{ current_user.username }}</span>
            <a href="{{ url_for('admin.admin_dashboard') }}" style="background:#0f3460;">Admin</a>
            <a href="{{ url_for('main.lots') }}" style="background:#0f3460;">Lots</a>
            <a href="{{ url_for('auth.logout') }}">Logout</a>
        </div>
    </nav>
    <div class="page-wrapper">
        <div class="dashboard-container">
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert" style="margin-bottom:20px;">{{ messages[0] }}</div>
                {% endif %}
            {% endwith %}
            <div class="section-header">
                <div class="section-title">Reset Password for {{ user.username }}</div>
                <a href="{{ url_for('admin.admin_dashboard') }}" class="btn" style="background:#666;">Back to Admin</a>
            </div>
            <div style="background:white; padding:30px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); margin-top:20px;">
                <form method="POST">
                    <div class="form-group">
                        <label>New Password for {{ user.username }}</label>
                        <input type="password" name="new_password" required placeholder="Enter new password">
                    </div>
                    <div style="margin-top:25px; display:flex; gap:10px;">
                        <a href="{{ url_for('admin.admin_dashboard') }}" class="btn" style="background:#666;">Cancel</a>
                        <button type="submit" class="btn">Reset Password</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
