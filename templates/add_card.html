<!DOCTYPE html>
<html>
<head>
    <title>Card Tracker - Add Card</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <h1>Card<span>Tracker</span></h1>
        <div class="nav-right">
            <span>Welcome, {{ current_user.username }}</span>
            {% if current_user.is_admin %}
    <a href="{{ url_for('admin.admin_dashboard') }}" style="background:#0f3460;">Admin</a>
{% endif %}
<a href="{{ url_for('auth.logout') }}">Logout</a>
        </div>
    </nav>
    <div class="form-wrapper">
        <div class="form-container">
            <h2>Add New Card</h2>
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert">{{ messages[0] }}</div>
                {% endif %}
            {% endwith %}
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Player Name *</label>
                    <input type="text" name="player_name" placeholder="e.g. Mickey Mantle" required>
                </div>
                <div class="form-group">
                    <label>Sport</label>
                    <select name="sport">
                        <option value="">Select Sport</option>
                        <option value="Baseball">Baseball</option>
                        <option value="Basketball">Basketball</option>
                        <option value="Football">Football</option>
                        <option value="Hockey">Hockey</option>
                        <option value="Soccer">Soccer</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Year</label>
                    <input type="text" name="year" placeholder="e.g. 1952">
                </div>
                <div class="form-group">
                    <label>Manufacturer</label>
                    <input type="text" name="manufacturer" placeholder="e.g. Topps">
                </div>
                <div class="form-group">
                    <label>Condition</label>
                    <select name="condition">
                        <option value="">Select Condition</option>
                        <option value="Poor">Poor</option>
                        <option value="Fair">Fair</option>
                        <option value="Good">Good</option>
                        <option value="Very Good">Very Good</option>
                        <option value="Excellent">Excellent</option>
                        <option value="Near Mint">Near Mint</option>
                        <option value="Mint">Mint</option>
                        <option value="Gem Mint">Gem Mint</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Buy Price *</label>
                        <input type="number" name="buy_price" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Sell Price (if sold)</label>
                        <input type="number" name="sell_price" step="0.01" placeholder="0.00">
                    </div>
                </div>
                <div class="form-group">
                    <label>Card Photo</label>
                    <input type="file" name="photo" accept="image/*">
                </div>
                <div class="form-buttons">
                    <a href="{{ url_for('main.dashboard') }}" class="btn-cancel">Cancel</a>
                    <button type="submit" class="btn">Add Card</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
