<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <title>Sign In — CardLedger</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center px-4 py-12">

    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="text-2xl font-bold text-gray-900">
                Card<span class="text-indigo-600">Ledger</span>
            </div>
            <p class="text-sm text-gray-400 mt-1">Your Collection. Your Stats.</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 px-8 py-10">
            <h1 class="text-xl font-bold text-gray-900 mb-6">Sign In</h1>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="mb-5 bg-indigo-50 border border-indigo-200 text-indigo-800 rounded-lg px-4 py-3 text-sm">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" class="space-y-4">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Email or Username</label>
                    <input type="text" name="email" placeholder="you@example.com" required
                           class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                    <input type="password" name="password" placeholder="••••••••" required
                           class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white">
                </div>

                <button type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold py-2.5 rounded-lg transition-colors mt-2">
                    Sign In
                </button>

            </form>

            <div class="mt-6 space-y-2 text-center text-sm text-gray-500">
                <p>
                    Don't have an account?
                    <a href="{{ url_for('auth.register') }}" class="text-indigo-600 hover:text-indigo-800 font-medium">Register here</a>
                </p>
                <p>
                    <a href="{{ url_for('auth.forgot_password') }}" class="text-indigo-600 hover:text-indigo-800 font-medium">Forgot your password?</a>
                </p>
            </div>
        </div>

    </div>

</body>
</html>
